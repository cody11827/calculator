<body style="background-color: #56637D;">

    <div class="calculator">
        <div><select name="calculator_options" id="calculator_option">
            <option value="+">+</option>

            <option value="/">/</option>
            <option value="*">*</option>
        </select></div>

        <div><input  size="9" type="text" id="fname" name="fname" placeholder="Number 1" required></div>
        <div><input  size="9" type="text" id="fname" name="fname" placeholder="Number 2" required></div>

        <div><button type="Enter">Enter</button></div>
        
    </div>
     

</body>
